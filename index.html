<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0f12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<title>Treino — Controle Semanal</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d0f12'/%3E%3Cg fill='%23ff4d2e'%3E%3Crect x='14' y='42' width='10' height='16' rx='3'/%3E%3Crect x='76' y='42' width='10' height='16' rx='3'/%3E%3Crect x='24' y='37' width='9' height='26' rx='3'/%3E%3Crect x='67' y='37' width='9' height='26' rx='3'/%3E%3Crect x='33' y='46' width='34' height='8' rx='4'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d0f12'/%3E%3Cg fill='%23ff4d2e'%3E%3Crect x='14' y='42' width='10' height='16' rx='3'/%3E%3Crect x='76' y='42' width='10' height='16' rx='3'/%3E%3Crect x='24' y='37' width='9' height='26' rx='3'/%3E%3Crect x='67' y='37' width='9' height='26' rx='3'/%3E%3Crect x='33' y='46' width='34' height='8' rx='4'/%3E%3C/g%3E%3C/svg%3E">
<style>
:root{
  --bg:#0b0d10; --bg2:#13161b; --surface:#181c23; --surface2:#212732;
  --line:#262d38; --line2:#39424f;
  --txt:#f2f5f9; --txt2:#aab4c1; --txt3:#717c8a;
  --accent:#ff4d2e; --accent2:#ff8a3d; --amber:#ffb020;
  --ok:#27d07a; --okdim:#165236; --info:#3da5ff;
  --radius:20px; --radius-sm:14px;
  --shadow:0 10px 34px rgba(0,0,0,.38); --shadow-sm:0 4px 14px rgba(0,0,0,.25);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(1100px 560px at 100% -10%, rgba(255,77,46,.07), transparent 55%), radial-gradient(1000px 520px at 0% -6%, #1b232e 0%, transparent 60%), var(--bg);
  background-attachment:fixed;color:var(--txt);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.45;padding-bottom:calc(90px + var(--safe-b));}
button{font-family:inherit}
.app{max-width:900px;margin:0 auto;padding:0 18px}
.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,rgba(13,15,18,.96),rgba(13,15,18,.78) 70%,rgba(13,15,18,0));
  backdrop-filter:blur(10px);padding:calc(14px + var(--safe-t)) 0 12px}
.topbar .app{display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.14em;font-size:18px}
.logo .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;box-shadow:0 6px 18px rgba(255,77,46,.35)}
.logo .dot svg{width:18px;height:18px;fill:#fff}
.logo b{background:linear-gradient(135deg,#fff,#cfd6df);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.spacer{flex:1}
.iconbtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--surface);
  color:var(--txt2);display:grid;place-items:center;cursor:pointer;transition:.15s}
.iconbtn:hover{border-color:var(--line2);color:var(--txt)}
.iconbtn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.card{background:linear-gradient(180deg,var(--surface),#14181e);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:14px 0;box-shadow:var(--shadow)}
.section-title{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 2px 8px}
.muted{color:var(--txt2)} .dim{color:var(--txt3)}
.row{display:flex;align-items:center;gap:12px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 9px;border-radius:999px;text-transform:uppercase}
.pill.accent{background:rgba(255,77,46,.14);color:#ff7a5e;border:1px solid rgba(255,77,46,.3)}
.pill.ok{background:rgba(39,208,122,.13);color:#4fe39b;border:1px solid rgba(39,208,122,.3)}
.pill.amber{background:rgba(255,176,32,.12);color:var(--amber);border:1px solid rgba(255,176,32,.28)}
.pill.gray{background:var(--surface2);color:var(--txt2);border:1px solid var(--line)}
.btn{appearance:none;border:none;border-radius:13px;padding:13px 16px;font-weight:700;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s;color:#fff}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 8px 20px rgba(255,77,46,.3)}
.btn.primary:active{transform:translateY(1px)}
.btn.ghost{background:var(--surface2);color:var(--txt);border:1px solid var(--line)}
.btn.block{width:100%}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--txt);background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:11px 12px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
label.fld{display:block;margin:10px 0}
label.fld span{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px;letter-spacing:.04em}
.hero{position:relative;overflow:hidden;border-radius:22px;padding:20px;background:linear-gradient(135deg,#22272f,#171b21);border:1px solid var(--line);margin-top:6px}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,77,46,.25),transparent 70%)}
.hero .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hero h1{margin:6px 0 2px;font-size:26px;font-weight:800;line-height:1.1}
.hero .foco{color:var(--txt2);font-size:14px}
.hero .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative;z-index:1}
.ring-wrap{display:flex;align-items:center;gap:16px;margin-top:16px;position:relative;z-index:1}
.ring{position:relative;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:17px}
.ring-stats{flex:1}
.ring-stats .big{font-size:15px;font-weight:700}
.bar{height:9px;border-radius:99px;background:var(--surface2);overflow:hidden;margin-top:8px}
.bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
.grp-head{display:flex;align-items:center;gap:8px;margin:18px 2px 6px}
.grp-head .gline{flex:1;height:1px;background:var(--line)}
.grp-head .gname{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent2)}
.ex{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px;margin:9px 0;transition:.15s}
.ex.done{border-color:rgba(39,208,122,.4);background:linear-gradient(180deg,rgba(39,208,122,.07),var(--surface))}
.ex .top{display:flex;gap:13px;align-items:flex-start}
.chk{width:28px;height:28px;border-radius:9px;border:2px solid var(--line2);flex:none;cursor:pointer;display:grid;place-items:center;margin-top:2px;transition:.15s;background:var(--bg2)}
.chk svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:3;opacity:0;transition:.15s}
.ex.done .chk{background:linear-gradient(135deg,var(--ok),#1fae66);border-color:transparent}
.ex.done .chk svg{opacity:1}
.ex .body{flex:1;min-width:0}
.ex .name{font-weight:700;font-size:15.5px}
.ex.done .name{color:var(--txt2)}
.prbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;color:#1b1205;background:linear-gradient(135deg,var(--amber),#ffd36b);padding:2px 7px;border-radius:99px;margin-left:6px;vertical-align:middle}
.ex .meta{font-size:12.5px;color:var(--txt3);margin-top:3px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ex .meta .s{color:var(--txt2);font-weight:600}
.sets{margin-top:11px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.setshead,.setrow{display:grid;grid-template-columns:46px 1fr 1fr;gap:8px;align-items:center}
.setshead{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);font-weight:700;padding:0 2px 4px}
.setshead span{text-align:center}.setshead span:first-child{text-align:left}
.setrow{margin:5px 0}
.setrow .sn{font-size:13px;font-weight:700;color:var(--txt2)}
.setrow input{padding:8px;text-align:center;font-size:14px}
.exacts{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chip-sm{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:6px 10px;border-radius:9px;cursor:pointer;
  background:var(--surface2);border:1px solid var(--line);color:var(--txt2);text-decoration:none}
.chip-sm:hover{border-color:var(--line2);color:var(--txt)}
.chip-sm svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.chip-sm.play{color:#ff8a6e;border-color:rgba(255,77,46,.25);background:rgba(255,77,46,.08)}
.chip-sm.rst{color:var(--info);border-color:rgba(61,165,255,.25);background:rgba(61,165,255,.08)}
.ex-edit{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;display:none}
.ex.editing .ex-edit{display:block}
.ex-edit .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.weeknav{display:flex;align-items:center;justify-content:space-between;margin:4px 0 6px}
.weeknav b{font-size:15px}
.daycard{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px;margin:9px 0;cursor:pointer;transition:.15s}
.daycard:hover{border-color:var(--line2)}
.daycard.today{border-color:rgba(255,77,46,.5);box-shadow:0 0 0 1px rgba(255,77,46,.2)}
.daycard .dnum{width:46px;height:46px;border-radius:12px;background:var(--surface2);flex:none;display:grid;place-items:center;text-align:center;line-height:1.1}
.daycard .dnum .wd{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.daycard .dnum .dd{font-size:18px;font-weight:800}
.daycard.done .dnum{background:linear-gradient(135deg,var(--okdim),#0f3a26)}
.daycard .info{flex:1;min-width:0}
.daycard .info .t{font-weight:700;font-size:15px}
.daycard .info .f{font-size:12.5px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.daycard .rt{text-align:right;flex:none}
.daycard .rt .p{font-weight:800;font-size:15px}
.daycard .rt .l{font-size:11px;color:var(--txt3)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px}
.stat .v{font-size:28px;font-weight:800;line-height:1}
.stat .v small{font-size:14px;color:var(--txt3);font-weight:700}
.stat .k{font-size:12px;color:var(--txt2);margin-top:6px;letter-spacing:.03em}
.stat.accent .v{color:var(--accent2)} .stat.ok .v{color:var(--ok)}
canvas{width:100%;display:block}
.wrow{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
.wrow:last-child{border-bottom:none}
.wrow .wk{font-weight:800;font-size:17px;width:96px}
.wrow .wd{flex:1;font-size:13px;color:var(--txt3)}
.wrow .wv{font-size:13px;font-weight:700;padding:3px 8px;border-radius:8px}
.wv.up{color:#ff8a6e;background:rgba(255,77,46,.12)} .wv.down{color:#4fe39b;background:rgba(39,208,122,.12)}
.wv.flat{color:var(--txt3);background:var(--surface2)}
.trash{color:var(--txt3);cursor:pointer;padding:4px}
.trash svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}
.prrow{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
.prrow:last-child{border:none}
.prrow .pn{flex:1;font-weight:600;font-size:14px}
.prrow .pv{font-weight:800;font-size:15px;color:var(--amber)}
.prrow .pd{font-size:11px;color:var(--txt3)}
.note{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin:10px 0}
.note h4{margin:0 0 5px;font-size:14px}
.note p{margin:0;color:var(--txt2);font-size:14px}
.legend{display:flex;gap:10px;align-items:flex-start;margin:8px 0}
.legend .tag{flex:none;margin-top:1px}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(20,23,28,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 0 calc(8px + var(--safe-b))}
.nav .app{display:flex;justify-content:space-around}
.navbtn{flex:1;min-width:0;background:none;border:none;color:var(--txt3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 1px;font-size:9.5px;font-weight:700;letter-spacing:.01em;white-space:nowrap;transition:.15s}
.navbtn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2}
.navbtn.active{color:var(--accent2)}
.navbtn.active svg{stroke:var(--accent2)}
@media(min-width:760px){
  body{padding-bottom:54px;padding-top:0}
  .topbar{position:static;padding:20px 0 10px}
  .nav{position:sticky;top:0;bottom:auto;border-top:none;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(11,13,16,.97),rgba(11,13,16,.86));backdrop-filter:blur(16px) saturate(140%);
    padding:8px 0;margin-bottom:22px;box-shadow:0 10px 24px rgba(0,0,0,.30)}
  .nav .app{justify-content:center;gap:4px;border-bottom:none;padding-bottom:0}
  .navbtn{flex:0 0 auto;flex-direction:row;gap:8px;font-size:13.5px;padding:10px 17px;border-radius:12px;border-bottom:none;color:var(--txt2)}
  .navbtn:hover{background:var(--surface);color:var(--txt)}
  .navbtn.active{background:rgba(255,77,46,.13);color:#fff}
  .navbtn.active svg{stroke:var(--accent2)}
  .navbtn svg{width:18px;height:18px}
  #view{padding-top:4px}
  .card{margin:18px 0;padding:20px}
  .stats{grid-template-columns:repeat(4,1fr);gap:14px}
  .hero{padding:26px}
}
.overlay{position:fixed;inset:0;z-index:80;background:rgba(5,6,8,.66);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
@media(min-width:760px){.overlay{align-items:center}}
.sheet{background:var(--bg2);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:520px;padding:18px 18px calc(20px + var(--safe-b));max-height:88vh;overflow:auto;animation:up .25s ease}
@media(min-width:760px){.sheet{border-radius:22px;animation:pop .2s ease}}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
@keyframes pop{from{transform:scale(.96);opacity:.4}to{transform:none;opacity:1}}
.sheet h3{margin:2px 0 14px;font-size:19px;display:flex;align-items:center;gap:9px}
.sheet .grab{width:42px;height:5px;border-radius:99px;background:var(--line2);margin:0 auto 14px}
.picklist{max-height:52vh;overflow:auto;margin:4px -4px 0;padding:0 4px}
.pickitem{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:11px;margin:7px 0;cursor:pointer;background:var(--surface)}
.pickitem:hover{border-color:var(--accent)}
.pickitem.cur{border-color:var(--accent);background:rgba(255,77,46,.08)}
.pickitem .pi-n{flex:1;font-weight:600;font-size:14.5px}
.pickitem .pi-g{font-size:11px;color:var(--txt3)}
.pickitem a.pi-v{color:#ff8a6e;padding:4px}
.pickitem a.pi-v svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.timer{text-align:center;padding:10px 0}
.timer .tnum{font-size:64px;font-weight:800;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#fff,#9fb0c0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.timer.warn .tnum{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tprog{height:8px;border-radius:99px;background:var(--surface2);overflow:hidden;margin:14px 0}
.tprog > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s linear}
.tbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:8px}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.chip{padding:8px 14px;border-radius:11px;border:1px solid var(--line);background:var(--surface);cursor:pointer;font-weight:700;font-size:14px;color:var(--txt2)}
.chip.on{border-color:var(--accent);color:#fff;background:rgba(255,77,46,.12)}
.fab{position:fixed;right:16px;bottom:calc(98px + var(--safe-b));z-index:45;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--info),#2e7fd6);color:#fff;box-shadow:0 10px 26px rgba(61,165,255,.4);display:grid;place-items:center}
.fab svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2}
@media(min-width:760px){.fab{bottom:24px;right:calc(50% - 440px + 16px)}}
.empty{text-align:center;color:var(--txt3);padding:34px 10px;font-size:14px}
.swrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);gap:12px}
.swrow:last-child{border:none}
.sw{width:48px;height:28px;border-radius:99px;background:var(--surface2);border:1px solid var(--line);position:relative;cursor:pointer;flex:none;transition:.15s}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.18s}
.sw.on{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.sw.on::after{left:22px}
.hint{font-size:12px;color:var(--txt3);margin-top:4px}
.ptable{width:100%;border-collapse:collapse;margin-top:10px}
.ptable td{padding:7px 4px;border-bottom:1px solid var(--line);font-size:14px}
.ptable td:last-child{text-align:right;font-weight:700}
.plate-res{text-align:center;font-size:15px;font-weight:700;margin-top:6px;line-height:1.7}
.plate-res .pc{display:inline-block;background:var(--surface2);border:1px solid var(--line2);border-radius:8px;padding:3px 9px;margin:3px}
/* ===== DIETA / CORPO / v3 ===== */
.dhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:2px 0}
.kcalbig{font-size:30px;font-weight:800;line-height:1}
.kcalbig small{font-size:14px;color:var(--txt3);font-weight:700}
.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.macro{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px}
.macro .ml{font-size:10.5px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.macro .mv{font-size:14px;font-weight:800;margin:3px 0 6px}
.macro .mv small{color:var(--txt3);font-weight:600;font-size:11px}
.macro.p .bar>i{background:linear-gradient(90deg,#3da5ff,#5ec4ff)}
.macro.c .bar>i{background:linear-gradient(90deg,var(--amber),#ffd36b)}
.macro.f .bar>i{background:linear-gradient(90deg,#c06bff,#e0a3ff)}
.water{display:flex;align-items:center;gap:10px;margin-top:6px}
.water .wv{font-weight:800;font-size:16px;min-width:104px}
.mealcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 13px;margin:10px 0}
.mealcard .mh{display:flex;align-items:center;gap:8px}
.mealcard .mh .mn{font-weight:800;font-size:15px;flex:1}

function planKeyForDate(d){return actProg().keyForDate(d);}
function actProg(){return PROGRAMS[state.programId]||PROGRAMS.refundini;}
function PLN(tipo){const p=actProg();if(p.plans&&p.plans[tipo])return p.plans[tipo];for(const id in PROGRAMS){if(PROGRAMS[id].plans&&PROGRAMS[id].plans[tipo])return PROGRAMS[id].plans[tipo];}return PLANS[tipo]||{tipo:tipo,titulo:tipo,foco:"",dia:"",ex:[]};}
function exAt(tipo,i){const base=(PLN(tipo).ex||[])[i]||{nome:"—",grupo:"",series:"",reps:"",obs:""};return Object.assign({},base,(state.overrides[tipo]||{})[i]||{});}
function slotId(tipo,i){return tipo+"-"+i;}
function exNameOfSid(sid){const p=sid.split("-");return exAt(p[0],+p[1]).nome;}
function dayLog(k){if(!state.log[k])state.log[k]={done:{}};if(!state.log[k].done)state.log[k].done={};return state.log[k];}
function exDone(k,tipo,i){const l=state.log[k];return !!(l&&l.done&&l.done[slotId(tipo,i)]);}
function countDone(k,tipo){let n=0,ex=PLN(tipo).ex||[];for(let i=0;i<ex.length;i++)if(exDone(k,tipo,i))n++;return n;}
function dayTotal(tipo){return (PLN(tipo).ex||[]).length;}
function isTrainingDay(tipo){return !PLN(tipo).rest;}
function curDate(){return selectedDate?parseYmd(selectedDate):today();}

/* sessões: carga x reps por série */
function seriesCount(tipo,i){const n=parseInt(exAt(tipo,i).series);return n>0?n:0;}
function getSets(k,tipo,i){const sid=slotId(tipo,i);const s=(state.sessions[k]||{})[sid];const n=seriesCount(tipo,i)||3;
  const arr=(s&&s.sets)?clone(s.sets):[];while(arr.length<n)arr.push({kg:"",reps:""});return arr;}
function setSet(k,tipo,i,idx,field,val){const sid=slotId(tipo,i);state.sessions[k]=state.sessions[k]||{};
  const cur=state.sessions[k][sid]||{sets:[]};cur.sets=cur.sets||[];while(cur.sets.length<=idx)cur.sets.push({kg:"",reps:""});
  cur.sets[idx][field]=val;try{const _e=exAt(tipo,i);cur.nm=_e.nome;cur.gp=_e.grupo;}catch(e){}state.sessions[k][sid]=cur;save();}
function lastSets(sid,beforeKey){const ks=Object.keys(state.sessions).filter(k=>k<beforeKey&&state.sessions[k][sid]&&(state.sessions[k][sid].sets||[]).some(s=>s.kg)).sort();
  if(!ks.length)return null;const k=ks[ks.length-1];return state.sessions[k][sid].sets;}
function best1RM(sets){let b=0;(sets||[]).forEach(s=>{const kg=parseFloat(s.kg),r=parseInt(s.reps);if(kg>0&&r>0){const e=kg*(1+r/30);if(e>b)b=e;}});return b;}
function maxKg(sets){let b=0;(sets||[]).forEach(s=>{const kg=parseFloat(s.kg);if(kg>b)b=kg;});return b;}
function sidBest1RM(k,sid){const s=(state.sessions[k]||{})[sid];return s?best1RM(s.sets):0;}
function allTimeBest1RM(sid,exceptKey){let b=0;Object.keys(state.sessions).forEach(k=>{if(k===exceptKey)return;const s=state.sessions[k][sid];if(s){const e=best1RM(s.sets);if(e>b)b=e;}});return b;}

/* vídeo: busca curada no YouTube */
function cleanName(n){return n.replace(/\(.*?\)/g,"").replace(/\s+ou\s+.*$/i,"").trim();}
function ytUrl(ex){const q=cleanName(ex.nome)+" "+ex.grupo+" execução correta";return "https://www.youtube.com/results?search_query="+encodeURIComponent(q);}

/* ===== NAV / RENDER ===== */
let currentTab="hoje",weekOffset=0,selectedDate=null,progEx=null;
function setTab(t){currentTab=t;document.querySelectorAll(".navbtn").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));render();try{window.scrollTo({top:0,behavior:"instant"});}catch(e){}}
document.querySelectorAll(".navbtn").forEach(b=>b.addEventListener("click",()=>setTab(b.dataset.tab)));
function render(){const v=document.getElementById("view");if(sessInt){clearInterval(sessInt);sessInt=null;}
  v.innerHTML=currentTab==="hoje"?viewHoje():currentTab==="semana"?viewSemana():currentTab==="dieta"?viewDieta():currentTab==="atividades"?viewAtividades():currentTab==="programas"?viewProgramas():currentTab==="corpo"||currentTab==="peso"?viewCorpo():currentTab==="progresso"?viewProgresso():viewNotas();
  bind();}
function ring(pct,size){size=size||74;const r=(size-10)/2,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<div class="ring" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--surface2)" stroke-width="8" fill="none"/><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="url(#g1)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff4d2e"/><stop offset="1" stop-color="#ff8a3d"/></linearGradient></defs></svg><div class="pct">${Math.round(pct)}%</div></div>`;}
function esc(s){return String(s==null?"":s).replace(/"/g,"&quot;");}

function viewHoje(){
  const d=curDate(),key=ymd(d),tipo=planKeyForDate(d),p=PLN(tipo);
  const total=dayTotal(tipo),done=countDone(key,tipo),pct=total?done/total*100:0;
  const isToday=key===ymd(today());
  const dateStr=`${WD_NAMES[d.getDay()]}, ${d.getDate()} de ${MESL[d.getMonth()]}`;
  const _lg=state.log[key]||{};const sessChip=(!p.rest&&_lg.start)?`<span class="sesschip" id="sessChip" data-start="${_lg.start}" data-end="${_lg.end||0}"><svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4M9 2h6"/></svg>${sessElapsedStr(_lg.start,_lg.end)}</span>`:"";
  let h=`<div class="hero"><div class="eyebrow">${isToday?"Treino de hoje":"Treino"} · ${dateStr}</div>
    <h1>${p.titulo}${p.variacao?' <span class="pill amber" style="vertical-align:middle">variação</span>':''}</h1>
    <div class="foco">${p.foco}</div>
    <div class="tags"><span class="pill ${p.rest?'gray':'accent'}">${p.dia}</span><span class="pill gray">${cycleWeekLabel(d)}</span>${!p.rest?`<span class="pill ok">${done}/${total} feitos</span>`:''}${sessChip}</div>`;
  if(!p.rest)h+=`<div class="ring-wrap">${ring(pct)}<div class="ring-stats"><div class="big">${done} de ${total} exercícios</div><div class="bar"><i style="width:${pct}%"></i></div><div class="muted" style="font-size:13px;margin-top:6px">${done===total&&total>0?"Treino concluído! 💪":(done>0?"Continue, falta pouco":"Bora começar")}</div></div></div>`;
  h+=`</div>`;
  if(!isToday)h=`<div class="row" style="margin:10px 2px"><button class="btn ghost" id="backToday"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Voltar para hoje</button></div>`+h;
  h+=`<button class="progbar" id="goProg"><span>${actProg().emoji} <b>${esc(actProg().nome)}</b></span><span class="muted" style="font-size:12px">trocar treino ›</span></button>`;
  if(isToday)h+=dashCard();
  h+=`<div class="row" style="gap:10px;margin:12px 0"><button class="btn ghost" id="goStretch" style="flex:1">🧘 Alongamento</button><button class="btn ghost" id="quickAct" style="flex:1">➕ Atividade</button></div>`;
  if(p.rest){return h+`<div class="card" style="text-align:center"><div style="font-size:38px">🧘</div><div style="font-weight:700;margin-top:6px">${tipo==="REC"?"Recuperação ativa":"Descanso completo"}</div><p class="muted" style="margin:6px 0 0">${p.ex[0].obs||p.foco}</p></div>`+(tipo==="REC"?`<div class="ex ${exDone(key,'REC',0)?'done':''}"><div class="top"><div class="chk" data-act="toggle" data-i="0"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div><div class="body"><div class="name">Fiz o cardio / abdômen</div><div class="meta">opcional · marque se realizou</div></div></div></div>`:"");}
  let lastG=null,body="";
  p.ex.forEach((_,i)=>{
    const ex=exAt(tipo,i),sid=slotId(tipo,i),isd=exDone(key,tipo,i);
    if(ex.grupo!==lastG){lastG=ex.grupo;body+=`<div class="grp-head"><span class="gname">${ex.grupo}</span><span class="gline"></span></div>`;}
    const meta=[];if(ex.series)meta.push(`<span class="s">${ex.series} séries</span>`);if(ex.reps)meta.push(ex.reps);if(ex.obs)meta.push(ex.obs);
    const isPR=sidBest1RM(key,sid)>0 && sidBest1RM(key,sid)>=allTimeBest1RM(sid,key);
    const sets=getSets(key,tipo,i),last=lastSets(sid,key);
    const _goal=state.settings.progReps||12,_topR=last?Math.max(0,...last.map(s=>parseInt(s.reps)||0)):0,_hadKg=!!(last&&last.some(s=>parseFloat(s.kg)>0));
    const progHtml=(isTrainingDay(tipo)&&_hadKg&&_topR>=_goal)?`<div class="proghint"><svg viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>Você fez ${_topR} reps na última sessão — tente subir a carga (+${progInc(ex.grupo)} kg).</div>`:"";
    let setsHtml=`<div class="sets"><div class="setshead"><span>série</span><span>kg</span><span>reps</span></div>`;
    for(let s=0;s<sets.length;s++){const ph=last&&last[s]?last[s]:null;
      setsHtml+=`<div class="setrow"><span class="sn">${s+1}ª</span><input type="number" inputmode="decimal" step="0.5" data-set="kg" data-i="${i}" data-s="${s}" value="${esc(sets[s].kg)}" placeholder="${ph&&ph.kg?esc(ph.kg):'–'}"><input type="number" inputmode="numeric" data-set="reps" data-i="${i}" data-s="${s}" value="${esc(sets[s].reps)}" placeholder="${ph&&ph.reps?esc(ph.reps):'–'}"></div>`;}
    setsHtml+=`</div>`;
    body+=`<div class="ex ${isd?'done':''}"><div class="top">
      <div class="chk" data-act="toggle" data-i="${i}"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
      <div class="body"><div class="name">${ex.nome}${isPR?'<span class="prbadge">🏆 PR</span>':''}</div>
        <div class="meta">${meta.join('<span class="dim">·</span> ')}</div>
        ${setsHtml}
        ${progHtml}
        <div class="exacts">
          <a class="chip-sm play" href="${ytUrl(ex)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9z"/></svg> Execução</a>
          <span class="chip-sm" data-act="swap" data-i="${i}"><svg viewBox="0 0 24 24"><path d="M7 7h11l-3-3M17 17H6l3 3"/></svg> Trocar</span>
          <span class="chip-sm rst" data-act="rest"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4M9 2h6"/></svg> Descanso</span>
          <span class="chip-sm" data-act="edit" data-i="${i}"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> Editar</span>
        </div>
        <div class="ex-edit"><div class="g2">
          <label class="fld"><span>Exercício</span><input data-e="nome" data-i="${i}" value="${esc(ex.nome)}"></label>
          <label class="fld"><span>Grupo</span><input data-e="grupo" data-i="${i}" value="${esc(ex.grupo)}"></label>
          <label class="fld"><span>Séries</span><input data-e="series" data-i="${i}" value="${esc(ex.series)}"></label>
          <label class="fld"><span>Repetições</span><input data-e="reps" data-i="${i}" value="${esc(ex.reps)}"></label>
        </div><div class="row" style="gap:8px"><button class="btn ghost" style="flex:1" data-act="saveEdit" data-i="${i}">Salvar</button><button class="btn ghost" data-act="resetEx" data-i="${i}" title="Restaurar original"><svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg></button></div></div>
      </div></div></div>`;
  });
  return h+warmupCard(tipo)+body+`<div style="height:14px"></div><button class="btn ${done===total?'ghost':'primary'} block" id="finishBtn">${done===total?'<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> Treino concluído':'Marcar tudo como feito'}</button><div style="height:8px"></div>`;
}

function viewSemana(){
  const base=mondayOf(addDays(today(),weekOffset*7));
  const days=[0,1,2,3,4,5,6].map(i=>addDays(base,i));
  let trained=0,exSum=0,totalPrev=0;
  days.forEach(d=>{const t=planKeyForDate(d),k=ymd(d);totalPrev+=dayTotal(t);const dn=countDone(k,t);exSum+=dn;if(isTrainingDay(t)&&dn>0)trained++;});
  const concl=totalPrev?exSum/totalPrev*100:0;
  const lbl=weekOffset===0?"Esta semana":(weekOffset===-1?"Semana passada":(weekOffset===1?"Próxima semana":`${base.getDate()}/${base.getMonth()+1}`));
  let h=`<div class="weeknav"><button class="iconbtn" id="wPrev"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button><b>${lbl} · ${cycleWeekLabel(base)}</b><button class="iconbtn" id="wNext"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button></div>
  <div class="card" style="display:flex;align-items:center;gap:16px">${ring(concl,66)}<div style="flex:1"><div class="row" style="gap:18px">
    <div><div style="font-size:22px;font-weight:800">${trained}</div><div class="muted" style="font-size:12px">dias treinados</div></div>
    <div><div style="font-size:22px;font-weight:800">${exSum}</div><div class="muted" style="font-size:12px">exercícios</div></div>
    <div><div style="font-size:22px;font-weight:800;color:var(--txt3)">${totalPrev}</div><div class="muted" style="font-size:12px">previstos</div></div>
  </div></div></div>`;
  days.forEach(d=>{const t=planKeyForDate(d),p=PLN(t),k=ymd(d),tot=dayTotal(t),dn=countDone(k,t),pct=tot?Math.round(dn/tot*100):0,isToday=k===ymd(today()),doneFull=isTrainingDay(t)&&dn>0;
    h+=`<div class="daycard ${isToday?'today':''} ${doneFull?'done':''}" data-open="${k}"><div class="dnum"><div class="wd">${WD_SHORT[d.getDay()]}</div><div class="dd">${d.getDate()}</div></div><div class="info"><div class="t">${p.titulo}${p.variacao?' · var':''}</div><div class="f">${p.foco}</div></div><div class="rt">${p.rest?`<span class="pill gray">descanso</span>`:`<div class="p" style="color:${pct>=100?'var(--ok)':(pct>0?'var(--accent2)':'var(--txt3)')}">${pct}%</div><div class="l">${dn}/${tot}</div>`}</div></div>`;});
  return h;
}

function viewCorpo(){
  const ws=[...state.weights].sort((a,b)=>a.date<b.date?-1:1);
  const last=ws.length?ws[ws.length-1]:null,first=ws.length?ws[0]:null;
  const totDiff=last&&first&&ws.length>1?(last.kg-first.kg):null;
  let h=`<div class="stats" style="grid-template-columns:1fr 1fr">
    <div class="stat"><div class="v">${last?last.kg.toFixed(1):"—"}<small> kg</small></div><div class="k">Último peso</div></div>
    <div class="stat"><div class="v" style="color:${totDiff==null?'var(--txt3)':(totDiff<=0?'var(--ok)':'var(--accent2)')}">${totDiff==null?"—":(totDiff>0?"+":"")+totDiff.toFixed(1)}<small> kg</small></div><div class="k">Variação total (${ws.length} reg.)</div></div></div>
  <div class="card"><div class="section-title" style="margin-top:0">Evolução</div>${ws.length>=2?'<canvas id="wchart" height="200"></canvas>':'<div class="empty">Adicione 2+ registros para ver o gráfico.</div>'}</div>
  <button class="btn primary block" id="addWeight"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Registrar peso</button>
  <div class="section-title">Histórico</div>`;
  if(!ws.length)h+=`<div class="empty">Nenhum registro ainda.</div>`;
  else{h+=`<div class="card" style="padding:4px 14px">`;
    [...ws].reverse().forEach((w,i,arr)=>{const earlier=arr[i+1],dd=earlier?(w.kg-earlier.kg):null,cls=dd==null?"flat":(dd<0?"down":(dd>0?"up":"flat")),txt=dd==null?"—":(dd>0?"+":"")+dd.toFixed(1)+" kg",dt=parseYmd(w.date);
      h+=`<div class="wrow"><div class="wk">${w.kg.toFixed(1)}<span style="font-size:12px;color:var(--txt3)"> kg</span></div><div class="wd">${dt.getDate()} ${MES[dt.getMonth()]} ${dt.getFullYear()}${w.obs?` · ${w.obs}`:''}</div><span class="wv ${cls}">${txt}</span><span class="trash" data-delw="${w.id}"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></span></div>`;});
    h+=`</div>`;}
  return h+measuresSection()+photosSection();
}

function progressByName(){const map={};
  Object.keys(state.sessions).forEach(dk=>{const day=state.sessions[dk];Object.keys(day).forEach(sid=>{const sets=day[sid].sets||[];if(!sets.some(s=>s.kg&&s.reps))return;
    const name=(day[sid].nm||exNameOfSid(sid)),o=map[name]||(map[name]={pts:{},maxKg:0,max1:0,prDate:dk});const e=best1RM(sets),mk=maxKg(sets);
    if(!o.pts[dk]||e>o.pts[dk])o.pts[dk]=e;if(mk>o.maxKg)o.maxKg=mk;if(e>o.max1){o.max1=e;o.prDate=dk;}});});
  return map;}

function viewProgresso(){
  let allTrained=0,allEx=0,allSeries=0;
  Object.keys(state.log).forEach(k=>{const t=planKeyForDate(parseYmd(k)),dn=countDone(k,t);if(isTrainingDay(t)&&dn>0)allTrained++;allEx+=dn;
    for(let i=0;i<(PLN(t).ex||[]).length;i++)if(exDone(k,t,i)){const s=parseInt(exAt(t,i).series);if(s)allSeries+=s;}});
  let streak=0,d=today();
  for(let n=0;n<400;n++){const t=planKeyForDate(d),k=ymd(d);if(!isTrainingDay(t)){d=addDays(d,-1);continue;}const dn=countDone(k,t);
    if(dn>0){streak++;d=addDays(d,-1);}else{if(k===ymd(today())){d=addDays(d,-1);continue;}break;}}
  const map=progressByName(),names=Object.keys(map).sort();
  if(progEx&&names.indexOf(progEx)<0)progEx=null;if(!progEx&&names.length)progEx=names[0];
  let prog="";
  if(names.length){const o=map[progEx];const npts=Object.keys(o.pts).length;
    prog=`<div class="card"><div class="section-title" style="margin-top:0">Progresso por exercício</div>
      <select id="exSelect">${names.map(n=>`<option value="${esc(n)}" ${n===progEx?"selected":""}>${n}</option>`).join("")}</select>
      <div style="height:10px"></div>${npts>=2?'<canvas id="exchart" height="190"></canvas>':'<div class="empty">Registre kg×reps em 2+ dias para ver a curva.</div>'}
      <div class="row" style="gap:16px;margin-top:8px"><div><div style="font-weight:800;font-size:18px;color:var(--amber)">${o.maxKg.toFixed(1)} kg</div><div class="muted" style="font-size:12px">carga máx.</div></div><div><div style="font-weight:800;font-size:18px">${o.max1.toFixed(1)} kg</div><div class="muted" style="font-size:12px">1RM estimado</div></div></div></div>`;}
  else prog=`<div class="card"><div class="section-title" style="margin-top:0">Progresso por exercício</div><div class="empty">Anote o peso e as reps das séries na aba <b>Hoje</b> para acompanhar sua evolução aqui.</div></div>`;
  // PRs
  const prList=names.map(n=>({n,kg:map[n].maxKg,d:map[n].prDate})).filter(x=>x.kg>0).sort((a,b)=>b.kg-a.kg).slice(0,8);
  let prs="";
  if(prList.length){prs=`<div class="card"><div class="section-title" style="margin-top:0">🏆 Recordes (PRs)</div>`+
    prList.map(x=>{const dt=parseYmd(x.d);return `<div class="prrow"><div class="pn">${x.n}</div><div style="text-align:right"><div class="pv">${x.kg.toFixed(1)} kg</div><div class="pd">${dt.getDate()} ${MES[dt.getMonth()]}</div></div></div>`;}).join("")+`</div>`;}
  const weeks=[];for(let w=7;w>=0;w--){const base=mondayOf(addDays(today(),-w*7));let tot=0,dn=0;for(let i=0;i<7;i++){const dd=addDays(base,i),t=planKeyForDate(dd);tot+=dayTotal(t);dn+=countDone(ymd(dd),t);}weeks.push({pct:tot?Math.round(dn/tot*100):0});}
  const avg=Math.round(weeks.reduce((a,b)=>a+b.pct,0)/weeks.length);
  return `<div class="stats">
    <div class="stat accent"><div class="v">${streak}</div><div class="k">🔥 Sequência (dias)</div></div>
    <div class="stat ok"><div class="v">${allTrained}</div><div class="k">Treinos concluídos</div></div>
    <div class="stat"><div class="v">${allEx}</div><div class="k">Exercícios feitos</div></div>
    <div class="stat"><div class="v">${allSeries}</div><div class="k">Séries totais</div></div></div>
  ${prog}${prs}
  <div class="card"><div class="section-title" style="margin-top:0">Adesão semanal · média ${avg}%</div><canvas id="achart" height="190"></canvas><div class="hint">Últimas 8 semanas · % de exercícios concluídos</div></div>
  <div class="card"><div class="section-title" style="margin-top:0">Resumo do ciclo</div><p class="muted" style="margin:0">Divisão <b>ABCDE + Full Body</b>. Quartas e sextas alternam <b>C1/C2</b> e <b>D1/D2</b> automaticamente. Hoje: <b>${cycleWeekLabel(today())}</b>.</p></div>`;
}

function viewNotas(){
  return `<div class="section-title" style="margin-top:8px">Estrutura do treino</div>
  <div class="note"><h4>Divisão semanal</h4><p>ABCDE + Full Body (proposta de Laércio Refundini). Segunda a sábado com treinos A, B, C1/C2, D1/D2 e E. Quinta é recuperação ativa e domingo descanso completo.</p></div>
  <div class="section-title">Alternância dos treinos C e D</div>

/* ===== BIND ===== */
function bind(){
  const back=document.getElementById("backToday");if(back)back.onclick=()=>{selectedDate=null;render();};
  const finish=document.getElementById("finishBtn");if(finish)finish.onclick=()=>{const d=curDate(),k=ymd(d),tipo=planKeyForDate(d),l=dayLog(k),tot=dayTotal(tipo),target=!(countDone(k,tipo)===tot);for(let i=0;i<tot;i++)l.done[slotId(tipo,i)]=target;
    if(isTrainingDay(tipo)){if(target){if(!l.start)l.start=Date.now();l.end=Date.now();}else{delete l.start;delete l.end;}}save();render();};
  document.querySelectorAll("[data-act]").forEach(el=>{const act=el.dataset.act;
    if(act==="toggle")el.onclick=()=>{const d=curDate(),k=ymd(d),tipo=planKeyForDate(d),i=+el.dataset.i,l=dayLog(k),sid=slotId(tipo,i);l.done[sid]=!l.done[sid];
      if(isTrainingDay(tipo)){const dn=countDone(k,tipo),tot=dayTotal(tipo);if(dn>0&&!l.start)l.start=Date.now();if(dn===0){delete l.start;delete l.end;}if(dn===tot&&tot>0){if(!l.end)l.end=Date.now();}else{delete l.end;}}
      save();
      if(l.done[sid]&&isTrainingDay(tipo)&&state.settings.autoRest){render();openTimer();return;}render();};
    if(act==="rest")el.onclick=()=>openTimer();
    if(act==="swap")el.onclick=()=>openSwap(planKeyForDate(curDate()),+el.dataset.i);
    if(act==="edit")el.onclick=()=>{el.closest(".ex").classList.toggle("editing");};
    if(act==="saveEdit")el.onclick=()=>{const i=+el.dataset.i,tipo=planKeyForDate(curDate()),exRow=el.closest(".ex"),g=k=>exRow.querySelector(`[data-e="${k}"]`).value;
      state.overrides[tipo]=state.overrides[tipo]||{};state.overrides[tipo][i]={nome:g("nome"),grupo:g("grupo"),series:g("series"),reps:g("reps")};save();render();};
    if(act==="resetEx")el.onclick=()=>{const i=+el.dataset.i,tipo=planKeyForDate(curDate());if(state.overrides[tipo])delete state.overrides[tipo][i];save();render();};
  });
  document.querySelectorAll("[data-set]").forEach(inp=>inp.onchange=()=>{const d=curDate();setSet(ymd(d),planKeyForDate(d),+inp.dataset.i,+inp.dataset.s,inp.dataset.set,inp.value);});
  const wp=document.getElementById("wPrev");if(wp)wp.onclick=()=>{weekOffset--;render();};
  const wn=document.getElementById("wNext");if(wn)wn.onclick=()=>{weekOffset++;render();};
  document.querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>{selectedDate=el.dataset.open;setTab("hoje");});
  const aw=document.getElementById("addWeight");if(aw)aw.onclick=openWeight;
  document.querySelectorAll("[data-delw]").forEach(el=>el.onclick=()=>{state.weights=state.weights.filter(w=>w.id!==el.dataset.delw);save();render();});
  const exSel=document.getElementById("exSelect");if(exSel)exSel.onchange=()=>{progEx=exSel.value;render();};
  // ---- dieta ----
  document.querySelectorAll("[data-eat]").forEach(el=>el.onclick=()=>toggleEat(el.dataset.eat));
  document.querySelectorAll("[data-delfood]").forEach(el=>el.onclick=ev=>{ev.stopPropagation();delFood(el.dataset.delfood);});
  document.querySelectorAll("[data-addfood]").forEach(el=>el.onclick=()=>openFoodPicker(+el.dataset.addfood));
  const am=document.getElementById("addMeal");if(am)am.onclick=addMeal;
  document.querySelectorAll("[data-delmeal]").forEach(el=>el.onclick=()=>delMeal(+el.dataset.delmeal));
  document.querySelectorAll("[data-water]").forEach(el=>el.onclick=()=>addWater(+el.dataset.water));
  const dtB=document.getElementById("dietTargets");if(dtB)dtB.onclick=openTargets;
  // ---- corpo ----
  const aMs=document.getElementById("addMeasure");if(aMs)aMs.onclick=openMeasure;
  document.querySelectorAll("[data-delm]").forEach(el=>el.onclick=()=>{state.measures=state.measures.filter(m=>m.id!==el.dataset.delm);save();render();});
  const aPh=document.getElementById("addPhoto");if(aPh)aPh.onclick=()=>document.getElementById("photoFile").click();
  const pf=document.getElementById("photoFile");if(pf)pf.onchange=onPhotoPick;
  document.querySelectorAll("[data-photo]").forEach(el=>el.onclick=()=>viewPhoto(el.dataset.photo));
  const mSel=document.getElementById("measureSel");if(mSel)mSel.onchange=()=>{measureMetric=mSel.value;render();};
  // ---- atividades + alongamento + dashboard ----
  document.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>setTab(el.dataset.go));
  const gpb=document.getElementById("goProg");if(gpb)gpb.onclick=()=>setTab("programas");
  document.querySelectorAll("[data-activate]").forEach(el=>el.onclick=()=>{state.programId=el.dataset.activate;save();selectedDate=null;setTab("hoje");});
  const gs=document.getElementById("goStretch");if(gs)gs.onclick=openStretch;
  const qa=document.getElementById("quickAct");if(qa)qa.onclick=()=>openActivity(ymd(curDate()));
  const aAct=document.getElementById("addActivity");if(aAct)aAct.onclick=()=>openActivity(ymd(today()));
  const sBtn=document.getElementById("stretchBtn");if(sBtn)sBtn.onclick=openStretch;
  document.querySelectorAll("[data-delact]").forEach(el=>el.onclick=()=>{state.activities=state.activities.filter(a=>a.id!==el.dataset.delact);save();render();});
  mountSessionClock();
  if(document.getElementById("wchart"))drawWeightChart();
  if(document.getElementById("exchart"))drawExChart();
  if(document.getElementById("achart"))drawAdherence();
  if(document.getElementById("mchart"))drawMeasureChart();
}

let swapState={tipo:null,i:null,all:false,q:""};
function openSwap(tipo,i){swapState={tipo,i,all:false,q:""};renderSwap();}
function renderSwap(){
  const {tipo,i,all,q}=swapState,ex=exAt(tipo,i),grupo=ex.grupo;
  let list=EXDB.filter(e=>all?true:e.grupo===grupo);
  if(q)list=list.filter(e=>e.nome.toLowerCase().includes(q.toLowerCase()));
  const groupHas=DB_GROUPS.indexOf(grupo)>=0;
  openSheet(`<h3><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:var(--accent2);fill:none;stroke-width:2"><path d="M7 7h11l-3-3M17 17H6l3 3"/></svg> Trocar exercício</h3>
    <div class="muted" style="margin:-6px 0 10px;font-size:13px">Atual: <b>${ex.nome}</b></div>
    <input id="swSearch" placeholder="Buscar exercício..." value="${esc(q)}">
    <div class="row" style="gap:8px;margin:10px 0"><button class="chip ${!all?'on':''}" id="swGroup" ${groupHas?'':'disabled style="opacity:.4"'}>${grupo}</button><button class="chip ${all?'on':''}" id="swAll">Todos os grupos</button></div>
    <div class="picklist">${list.length?list.map(e=>`<div class="pickitem ${e.nome===ex.nome?'cur':''}" data-pick="${esc(e.nome)}" data-pg="${esc(e.grupo)}"><div><div class="pi-n">${e.nome}</div>${all?`<div class="pi-g">${e.grupo}</div>`:''}</div><a class="pi-v" href="https://www.youtube.com/results?search_query=${encodeURIComponent(cleanName(e.nome)+' '+e.grupo+' execução correta')}" target="_blank" rel="noopener" title="Ver execução"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9z"/></svg></a></div>`).join(""):'<div class="empty">Nada encontrado.</div>'}</div>
    <div style="height:10px"></div><button class="btn ghost block" onclick="closeSheet()">Cancelar</button>`);
  const s=document.getElementById("swSearch");s.oninput=()=>{swapState.q=s.value;const list2=EXDB.filter(e=>(swapState.all?true:e.grupo===grupo)&&e.nome.toLowerCase().includes(s.value.toLowerCase()));
    document.querySelector(".picklist").innerHTML=list2.length?list2.map(e=>`<div class="pickitem ${e.nome===ex.nome?'cur':''}" data-pick="${esc(e.nome)}" data-pg="${esc(e.grupo)}"><div><div class="pi-n">${e.nome}</div>${swapState.all?`<div class="pi-g">${e.grupo}</div>`:''}</div><a class="pi-v" href="https://www.youtube.com/results?search_query=${encodeURIComponent(cleanName(e.nome)+' '+e.grupo+' execução correta')}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9z"/></svg></a></div>`).join(""):'<div class="empty">Nada encontrado.</div>';bindPicks();};
  document.getElementById("swGroup").onclick=()=>{if(!groupHas)return;swapState.all=false;renderSwap();};
  document.getElementById("swAll").onclick=()=>{swapState.all=true;renderSwap();};
  bindPicks();
}
function bindPicks(){document.querySelectorAll("[data-pick]").forEach(el=>el.onclick=()=>{const {tipo,i}=swapState,ex=exAt(tipo,i);
  state.overrides[tipo]=state.overrides[tipo]||{};state.overrides[tipo][i]={nome:el.dataset.pick,grupo:el.dataset.pg,series:ex.series,reps:ex.reps};save();closeSheet();render();});}

function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="treino-backup-"+ymd(today())+".json";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);state=Object.assign({},clone(defaultState),o);state.settings=Object.assign({},defaultState.settings,o.settings||{});save();closeSheet();render();alert("Dados importados com sucesso!");}catch(err){alert("Arquivo inválido.");}};r.readAsText(f);}

/* ===== FERRAMENTAS (calculadoras) ===== */
function openTools(){
  openSheet(`<h3>🔧 Ferramentas</h3>
    <div class="section-title" style="margin-top:0">Calculadora de 1RM</div>
    <div class="row" style="gap:8px"><input type="number" id="rmKg" placeholder="Peso (kg)" inputmode="decimal"><input type="number" id="rmReps" placeholder="Reps" inputmode="numeric"></div>
    <div id="rmOut" class="muted" style="margin-top:10px;font-size:13px">Informe peso e repetições para estimar seu 1RM (fórmula de Epley) e as cargas por percentual.</div>
    <div class="section-title">Calculadora de anilhas</div>
    <div class="row" style="gap:8px"><input type="number" id="plTotal" placeholder="Peso total (kg)" inputmode="decimal"><input type="number" id="plBar" value="${state.settings.bar}" inputmode="decimal" title="Barra"></div>
    <div class="hint">Discos por lado disponíveis: ${state.settings.plates.join(", ")} kg (edite em Ajustes)</div>
    <div id="plOut" class="plate-res" style="margin-top:8px"></div>
    <div style="height:14px"></div><button class="btn ghost block" onclick="closeSheet()">Fechar</button>`);
  const rmKg=document.getElementById("rmKg"),rmReps=document.getElementById("rmReps"),rmOut=document.getElementById("rmOut");
  function calcRM(){const kg=parseFloat(rmKg.value),r=parseInt(rmReps.value);if(!(kg>0&&r>0)){rmOut.innerHTML="Informe peso e repetições para estimar seu 1RM.";return;}
    const e=kg*(1+r/30);const rows=[100,95,90,85,80,75,70,65,60].map(p=>`<tr><td>${p}%${p===100?' (1RM)':''}</td><td>${roundTo(e*p/100,0.5).toFixed(1)} kg</td></tr>`).join("");
    rmOut.innerHTML=`<div style="font-weight:800;font-size:18px;color:var(--amber);margin-bottom:4px">1RM ≈ ${e.toFixed(1)} kg</div><table class="ptable">${rows}</table>`;}
  rmKg.oninput=calcRM;rmReps.oninput=calcRM;
  const plTotal=document.getElementById("plTotal"),plBar=document.getElementById("plBar"),plOut=document.getElementById("plOut");
  function calcPl(){const total=parseFloat(plTotal.value),bar=parseFloat(plBar.value)||0;if(!(total>0)){plOut.innerHTML="";return;}
    if(total<bar){plOut.innerHTML='<span class="muted">Peso menor que a barra.</span>';return;}
    let per=(total-bar)/2,rem=per;const used=[];const ps=[...state.settings.plates].sort((a,b)=>b-a);
    for(const p of ps)while(rem+1e-9>=p){used.push(p);rem-=p;}
    plOut.innerHTML=`<div class="muted" style="font-size:13px;margin-bottom:4px">${per.toFixed(2).replace(/\.00$/,"")} kg por lado:</div>`+(used.length?used.map(p=>`<span class="pc">${p}</span>`).join("+"):'<span class="muted">só a barra</span>')+(rem>0.01?`<div class="hint" style="margin-top:6px">faltam ${rem.toFixed(2).replace(/\.?0+$/,"")} kg por lado (ajuste o peso ou as anilhas)</div>`:"");}
  plTotal.oninput=calcPl;plBar.oninput=calcPl;
}
function roundTo(v,step){return Math.round(v/step)*step;}

let tInt=null,tLeft=0,tTotal=0,tPaused=false,actx=null;
function openTimer(){tTotal=state.settings.rest||90;tLeft=tTotal;tPaused=false;

function setupCanvas(cv){const dpr=window.devicePixelRatio||1,w=cv.clientWidth||320,h=cv.height;cv.width=w*dpr;cv.height=h*dpr;const c=cv.getContext("2d");c.scale(dpr,dpr);return {c,w,h};}
function lineChart(cv,xs,ys){const {c,w,h}=setupCanvas(cv);const pad={l:38,r:12,t:14,b:24};
  let mn=Math.min.apply(null,ys),mx=Math.max.apply(null,ys);if(mn===mx){mn-=1;mx+=1;}const py=(mx-mn)*0.15;mn-=py;mx+=py;
  const xmin=Math.min.apply(null,xs),xmax=Math.max.apply(null,xs);
  const X=t=>pad.l+(xmax===xmin?0.5:(t-xmin)/(xmax-xmin))*(w-pad.l-pad.r),Y=v=>pad.t+(1-(v-mn)/(mx-mn))*(h-pad.t-pad.b);
  c.strokeStyle="#2a313b";c.fillStyle="#6f7b88";c.font="11px -apple-system,sans-serif";c.lineWidth=1;
  for(let i=0;i<=3;i++){const val=mn+(mx-mn)*i/3,y=Y(val);c.beginPath();c.moveTo(pad.l,y);c.lineTo(w-pad.r,y);c.stroke();c.fillText(val.toFixed(1),4,y+3);}
  const grad=c.createLinearGradient(0,pad.t,0,h-pad.b);grad.addColorStop(0,"rgba(255,77,46,.35)");grad.addColorStop(1,"rgba(255,77,46,0)");
  c.beginPath();c.moveTo(X(xs[0]),Y(ys[0]));for(let i=1;i<xs.length;i++)c.lineTo(X(xs[i]),Y(ys[i]));c.lineTo(X(xs[xs.length-1]),h-pad.b);c.lineTo(X(xs[0]),h-pad.b);c.closePath();c.fillStyle=grad;c.fill();
  c.beginPath();c.moveTo(X(xs[0]),Y(ys[0]));for(let i=1;i<xs.length;i++)c.lineTo(X(xs[i]),Y(ys[i]));c.strokeStyle="#ff6a45";c.lineWidth=2.5;c.lineJoin="round";c.stroke();
  for(let i=0;i<xs.length;i++){c.beginPath();c.arc(X(xs[i]),Y(ys[i]),3.2,0,7);c.fillStyle="#ff8a3d";c.fill();c.strokeStyle="#14171c";c.lineWidth=2;c.stroke();}}
function drawWeightChart(){const cv=document.getElementById("wchart");if(!cv)return;const ws=[...state.weights].sort((a,b)=>a.date<b.date?-1:1);if(ws.length<2)return;lineChart(cv,ws.map(p=>parseYmd(p.date).getTime()),ws.map(p=>p.kg));}
function drawExChart(){const cv=document.getElementById("exchart");if(!cv||!progEx)return;const o=progressByName()[progEx];if(!o)return;const ks=Object.keys(o.pts).sort();if(ks.length<2)return;lineChart(cv,ks.map(k=>parseYmd(k).getTime()),ks.map(k=>o.pts[k]));}
function drawAdherence(){const cv=document.getElementById("achart");if(!cv)return;const {c,w,h}=setupCanvas(cv);const weeks=[];
  for(let wk=7;wk>=0;wk--){const base=mondayOf(addDays(today(),-wk*7));let tot=0,dn=0;for(let i=0;i<7;i++){const dd=addDays(base,i),t=planKeyForDate(dd);tot+=dayTotal(t);dn+=countDone(ymd(dd),t);}weeks.push({label:base.getDate()+"/"+(base.getMonth()+1),pct:tot?dn/tot*100:0,cur:wk===0});}
  const pad={l:8,r:8,t:10,b:24},n=weeks.length,gap=10,bw=(w-pad.l-pad.r-gap*(n-1))/n,maxH=h-pad.t-pad.b;c.font="10px -apple-system,sans-serif";
  weeks.forEach((wk,i)=>{const x=pad.l+i*(bw+gap),bh=Math.max(3,maxH*wk.pct/100),y=h-pad.b-bh;c.fillStyle="#21262e";c.beginPath();rr(c,x,pad.t,bw,maxH,6);c.fill();
    const g=c.createLinearGradient(0,y,0,h-pad.b);if(wk.cur){g.addColorStop(0,"#ff8a3d");g.addColorStop(1,"#ff4d2e");}else{g.addColorStop(0,"#4a5563");g.addColorStop(1,"#363f4b");}c.fillStyle=g;c.beginPath();rr(c,x,y,bw,bh,6);c.fill();
    c.fillStyle=wk.cur?"#ffb020":"#6f7b88";c.textAlign="center";c.fillText(wk.label,x+bw/2,h-9);if(wk.pct>0){c.fillStyle="#eef2f6";c.font="bold 10px -apple-system,sans-serif";c.fillText(Math.round(wk.pct)+"%",x+bw/2,y-4);c.font="10px -apple-system,sans-serif";}});}
function rr(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

const ACTS=[
 ["Corrida","🏃",9.8,1],["Caminhada","🚶",3.8,1],["Ciclismo","🚴",7.5,2],["Natação","🏊",7.0,0],
 ["Futebol","⚽",7.0,0],["Futsal","🥅",8.0,0],["Futvôlei","🏐",5.5,0],["Vôlei","🏐",4.0,0],

 ["Pular corda","🪢",11.0,0],["Funcional / HIIT","🔥",8.0,0],["Tênis","🎾",7.3,0],["Outro","✨",6.0,0]
];
function actMeta(name){return ACTS.find(a=>a[0]===name)||["Outro","✨",6.0,0];}
function actKcal(name,min,intensity){const met=actMeta(name)[2]*(intensity==="leve"?0.85:intensity==="intenso"?1.15:1),w=parseFloat(lastWeight())||75;return Math.round(met*w*(min/60));}
function fmtPace(min,km){if(!(min>0&&km>0))return "";const p=min/km,m=Math.floor(p),s=Math.round((p-m)*60);return (s===60?(m+1)+":00":m+":"+String(s).padStart(2,"0"))+" /km";}
function fmtSpeed(min,km){if(!(min>0&&km>0))return "";return (km/(min/60)).toFixed(1).replace(".",",")+" km/h";}
function actDetail(a){const dm=actMeta(a.type)[3],parts=[];if(a.dur)parts.push(a.dur+" min");
  if(a.dist>0){parts.push((+a.dist).toString().replace(".",",")+" km");if(dm===1)parts.push(fmtPace(a.dur,a.dist));else if(dm===2)parts.push(fmtSpeed(a.dur,a.dist));}
  if(a.intensity&&a.intensity!=="moderado")parts.push(a.intensity);return parts.join(" · ");}
function viewAtividades(){
  const acts=[...(state.activities||[])].sort((a,b)=>a.date<b.date?1:(a.date>b.date?-1:0));

  <div class="row" style="gap:10px;margin:4px 0 0"><button class="btn primary" id="addActivity" style="flex:1"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Registrar atividade</button><button class="btn ghost" id="stretchBtn" title="Alongamento">🧘</button></div>

  else{let lastDate=null;acts.forEach(a=>{if(a.date!==lastDate){lastDate=a.date;const dt=parseYmd(a.date);h+=`<div style="font-size:12.5px;color:var(--txt3);font-weight:700;margin:16px 2px 6px">${WD_NAMES[dt.getDay()]}, ${dt.getDate()} ${MES[dt.getMonth()]}</div>`;}
    const m=actMeta(a.type);h+=`<div class="actcard"><div class="ai">${m[1]}</div><div class="ab"><div class="at">${esc(a.type)}</div><div class="am">${actDetail(a)||"—"}${a.notes?` · ${esc(a.notes)}`:""}</div></div><div class="ak">${a.kcal?a.kcal+" kcal":""}</div><span class="trash" data-delact="${a.id}"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></span></div>`;});}
  return h;
}

    <p class="muted" style="margin:-4px 0 12px;font-size:13.5px">Sequências guiadas que avançam sozinhas, com aviso sonoro na troca.</p>
    <button class="btn primary block" id="rotShort">Rotina curta · ~4 min</button>
    <div style="height:8px"></div><button class="btn primary block" id="rotFull">Rotina completa · ~10 min</button>
    <div class="section-title">Por grupo muscular</div>
    <div class="row" style="gap:7px;flex-wrap:wrap">${[...new Set(STRETCHES.map(s=>s[1]))].map(g=>`<button class="chip" data-sgrp="${esc(g)}">${g}</button>`).join("")}</div>
    <div style="height:12px"></div><button class="btn ghost block" onclick="closeSheet()">Fechar</button>`);
  document.getElementById("rotShort").onclick=()=>startStretch(ROT_CURTA,"Rotina curta");
  document.getElementById("rotFull").onclick=()=>startStretch(ROT_COMPLETA,"Rotina completa");
  document.querySelectorAll("[data-sgrp]").forEach(b=>b.onclick=()=>{const g=b.dataset.sgrp,seq=STRETCHES.map((s,i)=>i).filter(i=>STRETCHES[i][1]===g);startStretch(seq,g);});
}
let stretch={seq:[],idx:0,end:0,int:null,paused:false,left:0,title:""};
function startStretch(seq,title){if(!seq||!seq.length)return;stretch={seq:seq.slice(),idx:0,title,paused:false,int:null,left:0,end:0};stretchStep();}
function stretchStep(){const s=STRETCHES[stretch.seq[stretch.idx]];if(!s){stretchDone();return;}
  stretch.left=s[2];stretch.end=Date.now()+s[2]*1000;stretch.paused=false;renderStretch();
  if(stretch.int)clearInterval(stretch.int);stretch.int=setInterval(stretchTick,200);}
function renderStretch(){const s=STRETCHES[stretch.seq[stretch.idx]];if(!s)return;
  const dots=stretch.seq.map((_,k)=>`<i class="${k<stretch.idx?'cdone':(k===stretch.idx?'on':'')}"></i>`).join("");
  openSheet(`<h3 style="justify-content:space-between">${esc(stretch.title)}<span style="font-size:13px;color:var(--txt3);font-weight:600">${stretch.idx+1}/${stretch.seq.length}</span></h3>
    <div class="stretchview"><div class="sg">${s[1]}</div><div class="sn">${s[0]}</div><div class="sd">${s[3]}</div>
      <div class="bignum" id="sNum">${stretch.left}</div><div class="stepdots">${dots}</div></div>
    <div class="row" style="gap:8px"><button class="btn ghost" id="sPrev" style="flex:1">◀</button><button class="btn ghost" id="sPause" style="flex:1.4">${stretch.paused?"Continuar":"Pausar"}</button><button class="btn primary" id="sNext" style="flex:1">▶</button></div>
    <div style="height:8px"></div><button class="btn ghost block" id="sStop">Encerrar</button>`);
  document.getElementById("sPrev").onclick=()=>{if(stretch.idx>0){stretch.idx--;stretchStep();}};
  document.getElementById("sNext").onclick=()=>{stretch.idx++;if(stretch.idx>=stretch.seq.length)stretchDone();else stretchStep();};
  document.getElementById("sStop").onclick=()=>{stopStretch();closeSheet();};
  document.getElementById("sPause").onclick=function(){stretch.paused=!stretch.paused;if(!stretch.paused)stretch.end=Date.now()+stretch.left*1000;this.textContent=stretch.paused?"Continuar":"Pausar";};
}
function stretchTick(){const el=document.getElementById("sNum");if(!el){stopStretch();return;}if(stretch.paused)return;
  stretch.left=Math.max(0,Math.round((stretch.end-Date.now())/1000));el.textContent=stretch.left;
  if(stretch.left<=0){beep();stretch.idx++;if(stretch.idx>=stretch.seq.length)stretchDone();else stretchStep();}}
function stopStretch(){if(stretch.int){clearInterval(stretch.int);stretch.int=null;}}
function stretchDone(){stopStretch();try{if(navigator.vibrate)navigator.vibrate([120,60,120]);}catch(e){}
  openSheet(`<h3>✅ Alongamento concluído</h3><p class="muted" style="margin:0">Boa! Sessão finalizada — isso ajuda na mobilidade e na recuperação muscular.</p><div style="height:12px"></div><button class="btn primary block" onclick="closeSheet()">Fechar</button>`);}

/* ===== SINCRONIZAÇÃO NA NUVEM (Firebase) ===== */
const FB_CFG_KEY="treino_fb_cfg";
let CID=localStorage.getItem("treino_cid");if(!CID){CID="c"+Math.random().toString(36).slice(2)+Date.now().toString(36);try{localStorage.setItem("treino_cid",CID);}catch(e){}}
let fbApp=null,fbAuth=null,fbDb=null,fbUser=null,syncUnsub=null,applyingRemote=false,lastSyncJson=null,pushTimer=null,syncState="off";
function getFbCfg(){try{return JSON.parse(localStorage.getItem(FB_CFG_KEY)||"null");}catch(e){return null;}}
function setFbCfg(o){try{localStorage.setItem(FB_CFG_KEY,JSON.stringify(o));}catch(e){}}
function parseFbCfg(txt){if(!txt)return null;try{return JSON.parse(txt);}catch(e){}const m=txt.match(/\{[\s\S]*\}/);if(m){try{return (new Function("return ("+m[0]+")"))();}catch(e2){}}return null;}
function syncStateForCloud(){const o=Object.assign({},state);delete o.photos;return JSON.stringify(o);}
function loadFirebase(cb){if(window.firebase&&window.firebase.firestore){cb();return;}
  const v="10.12.2",base="https://www.gstatic.com/firebasejs/"+v+"/",files=["firebase-app-compat.js","firebase-auth-compat.js","firebase-firestore-compat.js"];
  let i=0;(function nx(){if(i>=files.length){cb();return;}const s=document.createElement("script");s.src=base+files[i++];s.onload=nx;s.onerror=()=>{syncState="error";alert("Não foi possível carregar o Firebase. Verifique a internet.");};document.head.appendChild(s);})();}
function fbInit(then){const cfg=getFbCfg();if(!cfg){if(then)then(false);return;}syncState="connecting";
  loadFirebase(()=>{try{fbApp=fbApp||firebase.initializeApp(cfg);fbAuth=firebase.auth();fbDb=firebase.firestore();
    fbAuth.onAuthStateChanged(u=>{fbUser=u;if(u){syncState="ready";attachSync();}else{syncState="off";detachSync();}if(overlay.classList.contains("open"))refreshSyncPanel();});
    if(then)then(true);}catch(e){syncState="error";alert("Configuração do Firebase inválida.");if(then)then(false);}});}
function attachSync(){if(!fbUser||!fbDb)return;detachSync();const ref=fbDb.collection("treino").doc(fbUser.uid);
  syncUnsub=ref.onSnapshot(snap=>{if(!snap.exists)return;const d=snap.data();if(!d||!d.state)return;if(d.state===lastSyncJson)return;applyRemote(d.state);},function(){syncState="error";});
  ref.get().then(snap=>{if(!snap.exists)cloudPush(true);}).catch(()=>{});}
function detachSync(){if(syncUnsub){try{syncUnsub();}catch(e){}syncUnsub=null;}}
function applyRemote(json){try{const remote=JSON.parse(json);applyingRemote=true;const photos=state.photos;
  state=Object.assign({},clone(defaultState),remote);state.photos=photos;
  state.settings=Object.assign({},defaultState.settings,state.settings||{});
  state.diet=Object.assign({},clone(DEFAULT_DIET),state.diet||{});state.diet.targets=Object.assign({kcal:0,p:0,c:0,f:0,water:0},state.diet.targets||{});state.diet.meals=state.diet.meals||clone(DEFAULT_DIET.meals);state.diet.customFoods=state.diet.customFoods||[];state.diet.log=state.diet.log||{};
  try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}lastSyncJson=json;applyingRemote=false;render();}catch(e){applyingRemote=false;}}
function cloudPushDebounced(){if(!fbUser||!fbDb)return;clearTimeout(pushTimer);pushTimer=setTimeout(()=>cloudPush(),900);}
function cloudPush(force){if(!fbUser||!fbDb)return;const json=syncStateForCloud();if(json===lastSyncJson&&!force)return;syncState="syncing";
  fbDb.collection("treino").doc(fbUser.uid).set({state:json,cid:CID,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),v:5}).then(()=>{lastSyncJson=json;syncState="ready";}).catch(function(){syncState="error";});}
function fbLogin(em,pw,cb){fbAuth.signInWithEmailAndPassword(em,pw).then(()=>cb&&cb(null)).catch(e=>cb&&cb(e));}
function fbSignup(em,pw,cb){fbAuth.createUserWithEmailAndPassword(em,pw).then(()=>cb&&cb(null)).catch(e=>cb&&cb(e));}
function fbLogout(){try{if(fbAuth)fbAuth.signOut();}catch(e){}}
function fbErrMsg(e){const c=(e&&e.code)||"";if(/wrong-password|invalid-credential|user-not-found/.test(c))return "E-mail ou senha incorretos.";if(/email-already-in-use/.test(c))return "Este e-mail já tem conta — use Entrar.";if(/invalid-email/.test(c))return "E-mail inválido.";if(/weak-password/.test(c))return "Senha fraca (mínimo 6 caracteres).";if(/network/.test(c))return "Sem conexão com a internet.";return (e&&e.message)||"Erro ao entrar.";}
function syncLabel(){return syncState==="syncing"?"sincronizando…":syncState==="error"?"erro":syncState==="ready"?"sincronizado":syncState==="connecting"?"conectando…":"—";}
function refreshSyncPanel(){if(overlay.classList.contains("open"))openSync();}
function openSync(){const cfg=getFbCfg();let body;
  if(!cfg){body=`<h3>☁️ Sincronização na nuvem</h3>
    <p class="muted" style="font-size:13.5px;margin:-4px 0 10px">Cole a configuração do seu projeto Firebase (o objeto <b>firebaseConfig</b>). Passo a passo no arquivo <b>CONFIGURAR-SYNC.md</b>.</p>
    <label class="fld"><span>Configuração (firebaseConfig)</span><textarea id="fbCfg" rows="7" style="resize:vertical;font-family:monospace;font-size:12.5px" placeholder='{ "apiKey": "...", "authDomain": "...", "projectId": "...", "appId": "..." }'></textarea></label>
    <button class="btn primary block" id="fbSaveCfg">Salvar e conectar</button>
    <div style="height:8px"></div><button class="btn ghost block" onclick="closeSheet()">Fechar</button>`;}
  else if(!fbUser){body=`<h3>☁️ Entrar para sincronizar</h3>
    <div class="hint" style="margin:-4px 0 8px">${syncState==="connecting"?"Conectando ao Firebase…":syncState==="error"?"Erro de conexão — confira a configuração.":"Use o mesmo e-mail e senha nos dois aparelhos."}</div>
    <label class="fld"><span>E-mail</span><input type="email" id="fbEmail" autocomplete="username"></label>
    <label class="fld"><span>Senha</span><input type="password" id="fbPw" autocomplete="current-password"></label>
    <div class="row" style="gap:8px"><button class="btn primary" style="flex:1" id="fbLoginBtn">Entrar</button><button class="btn ghost" style="flex:1" id="fbSignupBtn">Criar conta</button></div>
    <div id="fbErr" class="hint" style="color:var(--accent);min-height:15px"></div>
    <div style="height:6px"></div><button class="btn ghost block" id="fbForget">Trocar configuração</button>
    <div style="height:6px"></div><button class="btn ghost block" onclick="closeSheet()">Fechar</button>`;}
  else{body=`<h3>☁️ Sincronização ativa</h3>
    <div class="swrow"><div><b>Conectado</b><div class="hint">${esc(fbUser.email||"")}</div></div><span class="pill ok">${syncLabel()}</span></div>
    <p class="muted" style="font-size:13px;margin:10px 0">Treino, dieta, atividades e medidas sincronizam automaticamente entre os aparelhos. As <b>fotos</b> ficam só neste aparelho.</p>
    <button class="btn ghost block" id="fbPushNow">Forçar envio agora</button>
    <div style="height:8px"></div><button class="btn ghost block" id="fbLogout" style="color:var(--accent)">Sair desta conta</button>
    <div style="height:6px"></div><button class="btn primary block" onclick="closeSheet()">Fechar</button>`;}
  openSheet(body);bindSyncPanel();}
function bindSyncPanel(){
  const sc=document.getElementById("fbSaveCfg");if(sc)sc.onclick=()=>{const cfg=parseFbCfg(document.getElementById("fbCfg").value);if(!cfg||!cfg.apiKey||!cfg.projectId){alert("Configuração inválida. Cole o objeto firebaseConfig completo (precisa ter apiKey e projectId).");return;}setFbCfg(cfg);fbApp=null;fbInit(()=>openSync());};
  const lb=document.getElementById("fbLoginBtn");if(lb)lb.onclick=()=>{const e=document.getElementById("fbEmail").value.trim(),p=document.getElementById("fbPw").value;if(!e||!p){document.getElementById("fbErr").textContent="Preencha e-mail e senha.";return;}document.getElementById("fbErr").textContent="Entrando…";fbLogin(e,p,err=>{if(err)document.getElementById("fbErr").textContent=fbErrMsg(err);});};
  const sb=document.getElementById("fbSignupBtn");if(sb)sb.onclick=()=>{const e=document.getElementById("fbEmail").value.trim(),p=document.getElementById("fbPw").value;if(!e||p.length<6){document.getElementById("fbErr").textContent="E-mail válido e senha de 6+ caracteres.";return;}document.getElementById("fbErr").textContent="Criando conta…";fbSignup(e,p,err=>{if(err)document.getElementById("fbErr").textContent=fbErrMsg(err);});};
  const fg=document.getElementById("fbForget");if(fg)fg.onclick=()=>{localStorage.removeItem(FB_CFG_KEY);detachSync();fbUser=null;fbApp=null;syncState="off";openSync();};
  const pn=document.getElementById("fbPushNow");if(pn)pn.onclick=()=>{cloudPush(true);setTimeout(refreshSyncPanel,400);};
  const lo=document.getElementById("fbLogout");if(lo)lo.onclick=()=>{fbLogout();};
}

function viewProgramas(){
  let h=`<div class="section-title" style="margin-top:8px">Programa de treino</div>
  <p class="muted" style="margin:0 0 6px;font-size:13.5px">Escolha qual treino seguir. O programa ativo comanda as abas <b>Hoje</b> e <b>Semana</b>. Seu histórico de cargas é guardado por exercício e continua valendo ao trocar.</p>`;
  PROG_ORDER.forEach(id=>{const p=PROGRAMS[id];if(!p)return;const active=state.programId===id;
    h+=`<div class="card" style="${active?'border-color:rgba(255,77,46,.5);box-shadow:0 0 0 1px rgba(255,77,46,.25),var(--shadow)':''}">
      <div class="row" style="gap:12px;align-items:flex-start"><div style="font-size:30px;line-height:1.1">${p.emoji}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:16px">${esc(p.nome)} ${active?'<span class="pill ok" style="vertical-align:middle">ativo</span>':''}</div>
      <div class="muted" style="font-size:12px;margin:1px 0 6px">por ${esc(p.autor)} · ${progDaysSummary(p)}</div>
      <div class="muted" style="font-size:13px;line-height:1.4">${esc(p.desc)}</div>
      ${active?'':`<div style="height:10px"></div><button class="btn primary" data-activate="${id}">Usar este programa</button>`}
      </div></div></div>`;});
  h+=`<div class="hint" style="margin:10px 2px 0">Os treinos de atletas são aproximações para inspiração — ajuste cargas, volume e descanso ao seu nível e objetivo. Você pode trocar exercícios em cada treino na aba Hoje.</div>`;
  return h;
}
function openOnboard(){openSheet(`<h3>👋 Bem-vindo ao Treino</h3>
  <p class="muted" style="font-size:14px;margin:-2px 0 12px">Seu app de treino, dieta e atividades — funciona offline e pode ser instalado no celular e no PC.</p>
  <div class="note" style="margin:8px 0"><b>1.</b> Escolha um <b>programa</b> (seu ABCDE ou um do banco de atletas).</div>
  <div class="note" style="margin:8px 0"><b>2.</b> Na aba <b>Hoje</b>, marque os exercícios e registre carga × repetições.</div>
  <div class="note" style="margin:8px 0"><b>3.</b> Acompanhe <b>Dieta</b>, <b>Atividades</b> e <b>Corpo</b>. Em <b>⚙️</b> dá para sincronizar entre aparelhos.</div>
  <button class="btn primary block" id="obPrograms">Escolher meu programa</button>
  <div style="height:8px"></div><button class="btn ghost block" id="obClose">Começar agora</button>`);
  document.getElementById("obPrograms").onclick=()=>{markOnboarded();closeSheet();setTab("programas");};
  document.getElementById("obClose").onclick=()=>{markOnboarded();closeSheet();};}
function markOnboarded(){try{localStorage.setItem("treino_onboarded","1");}catch(e){}}

/* ===== INIT ===== */
document.getElementById("settingsBtn").onclick=openSettings;
document.getElementById("infoBtn").onclick=()=>setTab("notas");
document.getElementById("toolsBtn").onclick=openTools;
document.getElementById("fabTimer").onclick=openTimer;
document.getElementById("cycleBtn").onclick=()=>{const cur=cycleWeekLabel(today());state.anchor=ymd(addDays(parseYmd(state.anchor),7));save();render();
  openSheet(`<h3>↻ Ciclo ajustado</h3><p class="muted">Antes: <b>${cur}</b><br>Agora: <b>${cycleWeekLabel(today())}</b></p><p class="hint">Toque novamente no ↻ do topo se precisar inverter de volta.</p><div style="height:10px"></div><button class="btn primary block" onclick="closeSheet()">Entendi</button>`);};
window.addEventListener("resize",()=>{if(["peso","corpo","progresso"].indexOf(currentTab)>=0)render();});
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}
if(getFbCfg())fbInit();
setTab("hoje");
if(!localStorage.getItem("treino_onboarded"))setTimeout(openOnboard,500);
</script>
</body>
</html>
